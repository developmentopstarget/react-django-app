services:
  db:
    image: postgres:16-alpine
    env_file: backend/.env
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME must be set via --env-file backend/.env}
      POSTGRES_USER: ${DB_USER:?DB_USER must be set via --env-file backend/.env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set via --env-file backend/.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:?DB_USER must be set via --env-file backend/.env} -d ${DB_NAME:?DB_NAME must be set via --env-file backend/.env}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./backend
    command: python manage.py migrate --noinput
    env_file: backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    env_file: backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
